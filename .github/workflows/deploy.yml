name: Deploy static site via SFTP

on:
  push:
    branches: [ main ]
    paths:
      - "index.html"
      - "stylesheets/**"
      - "javascripts/**"
      - "images/**"
      - "fonts/**"
      - "data/**"
  workflow_dispatch:

concurrency:
  group: sftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy folder
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -v index.html deploy/ || true
          for d in stylesheets javascripts images fonts data; do
            if [ -d "$d" ]; then
              mkdir -p "deploy/$d"
              rsync -a "$d"/ "deploy/$d"/
            fi
          done

      - name: Setup SSH config (jumphost + target)
        env:
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          JUMPHOST: ${{ secrets.JUMPHOST }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          # Runs on the GitHub Actions runner (ephemeral Ubuntu VM).
          # Each Host block sets options PER HOP — necessary because
          # `-J` / ProxyJump on the command line does NOT propagate
          # algorithm options to the jumphost connection.
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host jumphost
            Hostname ${JUMPHOST}
            User ${SFTP_USERNAME}
            HostKeyAlgorithms +ssh-rsa
            PubkeyAcceptedKeyTypes +ssh-rsa
            PreferredAuthentications password,keyboard-interactive
            PubkeyAuthentication no
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

          Host deploy-target
            Hostname ${SFTP_HOST}
            Port ${SFTP_PORT}
            User ${SFTP_USERNAME}
            HostKeyAlgorithms +ssh-rsa
            PubkeyAcceptedKeyTypes +ssh-rsa
            PreferredAuthentications password,keyboard-interactive
            PubkeyAuthentication no
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand ssh -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedKeyTypes=+ssh-rsa -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p jumphost
          EOF
          chmod 600 ~/.ssh/config

      - name: Setup SSH_ASKPASS helper
        env:
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          # SSH_ASKPASS is the standard OpenSSH mechanism for non-interactive
          # password input. Unlike sshpass, it works in nested ssh contexts
          # (e.g., as ProxyCommand) because it doesn't depend on a controlling
          # tty being available.
          mkdir -p "$HOME/.ssh-helpers"
          # The askpass script reads the password from a file (not env var)
          # so it can run inside subprocesses where env may differ.
          umask 077
          printf '%s' "$SFTP_PASSWORD" > "$HOME/.ssh-helpers/passfile"
          cat > "$HOME/.ssh-helpers/askpass.sh" <<'EOF'
          #!/bin/bash
          cat "$HOME/.ssh-helpers/passfile"
          EOF
          chmod 700 "$HOME/.ssh-helpers/askpass.sh"

      - name: Deploy with rsync over SSH (via jumphost)
        env:
          SSH_ASKPASS: /home/runner/.ssh-helpers/askpass.sh
          SSH_ASKPASS_REQUIRE: force
          DISPLAY: ":0"
        run: |
          # setsid detaches from the controlling tty so SSH_ASKPASS is used
          # for all password prompts (both outer ssh to deploy-target and
          # inner ssh in ProxyCommand to jumphost).
          setsid -w rsync -avz --delete \
            -e "ssh" \
            --exclude='.git*' \
            --exclude='.DS_Store' \
            ./deploy/ \
            deploy-target:${{ secrets.SFTP_REMOTE_PATH }}/
